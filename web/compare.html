function drawEnvelope(canvasId, datasets) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const maxVal = Math.max(...datasets.flatMap(d => d.data));

  datasets.forEach(d => {
    ctx.strokeStyle = d.color;
    ctx.lineWidth = d.width || 1;
    ctx.beginPath();
    d.data.forEach((v, i) => {
      const x = i / d.data.length * w;
      const y = h - (v / maxVal) * (h - 20) - 10;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // Legend
  let lx = 10;
  datasets.forEach(d => {
    ctx.fillStyle = d.color;
    ctx.fillRect(lx, 10, 20, 3);
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText(d.label, lx + 25, 15);
    lx += ctx.measureText(d.label).width + 40;
  });
}

function drawSpectrum(canvasId) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const minDb = -80, maxDb = 0;

  [{'data': refSpectrum, 'color': '#4ecca3', 'label': 'Reference'},
   {'data': ourSpectrum, 'color': '#e94560', 'label': 'Ours'}].forEach(d => {
    ctx.strokeStyle = d.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    d.data.forEach((v, i) => {
      const x = i / d.data.length * w;
      const y = h - ((Math.max(v, minDb) - minDb) / (maxDb - minDb)) * (h - 20) - 10;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // Frequency labels
  ctx.fillStyle = '#555';
  ctx.font = '11px monospace';
  [1000, 2000, 4000, 8000, 12000, 16000].forEach(f => {
    const x = (f / refFreqs[refFreqs.length-1]) * w;
    ctx.fillText(f >= 1000 ? (f/1000)+'kHz' : f+'Hz', x, h - 2);
  });

  ctx.fillStyle = '#4ecca3'; ctx.fillRect(10, 10, 20, 3);
  ctx.fillStyle = '#888'; ctx.fillText('Reference', 35, 15);
  ctx.fillStyle = '#e94560'; ctx.fillRect(120, 10, 20, 3);
  ctx.fillStyle = '#888'; ctx.fillText('Ours', 145, 15);
}
